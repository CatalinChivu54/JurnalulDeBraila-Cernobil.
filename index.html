<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JurnalulDeBRAILA Stiri</title>
    <style>
        /* White idle screen – only on very first visit */
        #idleScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            font-family: -apple-system, sans-serif;
            font-size: 1.4em;
            color: gray;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Black trap – the main prank screen */
        #trap {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            font-family: -apple-system, sans-serif;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            display: none; /* shown after first tap */
        }

        /* Scary text positions */
        .msg {
            position: absolute;
            color: red;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            font-size: 1.4em;
        }
        .msg.top    { top: 10px; left: 50%; transform: translateX(-50%); }
        .msg.left   { left: 10px; top: 50%; transform: translateY(-50%); }
        .msg.center { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; }
        .msg.right  { right: 10px; top: 50%; transform: translateY(-50%); }
        .msg.bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }

        /* Resume hint (after reload) */
        #resumeHint {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            color: yellow;
            font-size: 1em;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 10px;
            display: none;
            z-index: 10000;
        }

        /* ----- FAKE ALERT / POPUP ----- */
        #fakeAlert {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;          /* shown by JS */
            align-items: center;
            justify-content: center;
            z-index: 100000;        /* above everything */
            user-select: none;
            -webkit-user-select: none;
        }
        #fakeAlert .alertBox {
            background: #1e1e1e;
            border: 2px solid red;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 80%;
            text-align: center;
            color: white;
            font-family: -apple-system, sans-serif;
            box-shadow: 0 0 30px rgba(255,0,0,0.7);
        }
        #fakeAlert .alertBox p {
            font-size: 1.3em;
            margin: 0 0 25px 0;
        }
        #fakeAlert .alertBox button {
            background: red;
            color: white;
            border: none;
            font-size: 1.2em;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            /* button looks tappable but does nothing useful */
        }
    </style>
</head>

    <div id="trap">

        <div class="msg left">⚠️ Cernobil infected THE PHONE ⚠️</div>
        <div class="msg center">⚠️ Cernobil infected THE PHONE ⚠️<br>Call support: STELUTA😍</div>
        <div class="msg right">⚠️ Cernobil infected THE PHONE ⚠️</div>
        <div class="msg bottom">⚠️ Cernobil infected THE PHONE ⚠️</div>
        <div id="resumeHint">⚠️ Tap to continue ⚠️</div>
    </div>

    <!-- Fake alert popup (replaces native alert) -->

        <div class="alertBox">

    <script>
        const idle       = document.getElementById('idleScreen');
        const trap       = document.getElementById('trap');
        const resumeHint = document.getElementById('resumeHint');
        const audio      = document.getElementById('moo');
        const fakeAlert  = document.getElementById('fakeAlert');
        const fakeOkBtn  = document.getElementById('fakeOkBtn');
        let prankRunning = false;

        // ----- Fake alert that reappears infinitely -----
        function showFakeAlert() {
            fakeAlert.style.display = 'flex';
            // When the user taps OK, hide it momentarily and then show again instantly
            fakeOkBtn.onclick = function(e) {
                e.stopPropagation();
                // Hide for 1 millisecond, then show again (so the sound never pauses)
                fakeAlert.style.display = 'none';
                setTimeout(() => {
                    fakeAlert.style.display = 'flex';
                }, 1);
            };
            // Also prevent closing by tapping outside
            fakeAlert.onclick = function(e) {
                if (e.target === fakeAlert) {
                    // same as OK
                    fakeAlert.style.display = 'none';
                    setTimeout(() => {
                        fakeAlert.style.display = 'flex';
                    }, 1);
                }
            };
        }

        // ----- Start the whole chaos -----
        function beginChaos() {
            if (prankRunning) return;
            prankRunning = true;

            // 1. Play the moo sound (now we have a user gesture)
            audio.play().catch(e => console.log('Audio play failed:', e));

            // 2. Fullscreen
            const requestFS = document.documentElement.requestFullscreen ||
                              document.documentElement.webkitRequestFullscreen;
            if (requestFS) {
                requestFS.call(document.documentElement).catch(e => {});
            }

            // 3. Trap back button
            history.pushState(null, null, location.href);
            window.onpopstate = function() {
                history.pushState(null, null, location.href);
            };

            // 4. Warn on leaving
            window.onbeforeunload = function() {
                return "CHIAR AI CREZUT CA SCAPI?";
            };

            // 5. Keep fullscreen & audio alive
            setInterval(() => {
                if (audio.paused) audio.play();
                if (!document.fullscreenElement && requestFS) {
                    requestFS.call(document.documentElement).catch(e => {});
                }
            }, 500);

            // 6. Launch the fake popup loop (no native alerts)
            showFakeAlert();

            // Remember we started
            sessionStorage.setItem('mooPrank', 'active');
            resumeHint.style.display = 'none';
        }

        // ----- First tap on idle screen -----
        function handleFirstTap() {
            idle.style.display = 'none';
            trap.style.display = 'block';
            beginChaos();
        }
        idle.addEventListener('click', handleFirstTap);
        idle.addEventListener('touchstart', handleFirstTap);

        // ----- On page load: check if prank was already active -----
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('mooPrank') === 'active') {
                // Prank was active → go straight to black screen
                idle.style.display = 'none';
                trap.style.display = 'block';
                // Need a tap to resume audio
                resumeHint.style.display = 'block';
                function resumeHandler(e) {
                    resumeHint.style.display = 'none';
                    trap.removeEventListener('click', resumeHandler);
                    trap.removeEventListener('touchstart', resumeHandler);
                    beginChaos();
                }
                trap.addEventListener('click', resumeHandler);
                trap.addEventListener('touchstart', resumeHandler);
            }
        });
    </script>
</body>
</html>
